<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmeldung … | TNT-Zockt</title>
<style>
  body{
    background:#08080c; color:#f6f4ef; font-family:'Manrope',sans-serif;
    display:flex; align-items:center; justify-content:center; height:100vh; margin:0; text-align:center;
  }
  a{ color:#28f0e0; }
  .box{ max-width:340px; padding:24px; }
  .spinner{
    width:36px; height:36px; border-radius:50%;
    border:3px solid #26232e; border-top-color:#53fc18; margin:0 auto 16px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <div id="status">Kick-Anmeldung wird abgeschlossen …</div>
  </div>

<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  const state = params.get('state');
  const errorParam = params.get('error');
  const savedState = sessionStorage.getItem('kick_oauth_state');
  const verifier = sessionStorage.getItem('kick_code_verifier');
  const returnPage = sessionStorage.getItem('kick_redirect_page') || '/index.html';
  const statusEl = document.getElementById('status');

  function fail(msg){
    document.getElementById('spinner').style.display = 'none';
    statusEl.innerHTML = 'Anmeldung fehlgeschlagen: ' + msg + '<br><br><a href="' + returnPage + '">← Zurück zur Seite</a>';
  }

  if(errorParam){ fail(errorParam); return; }
  if(!code || !verifier || state !== savedState){ fail('Ungültige Anmelde-Antwort.'); return; }

  try{
    const redirectUri = window.location.origin + '/kick-callback.html';
    const res = await fetch('/api/kick-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, code_verifier: verifier, redirect_uri: redirectUri })
    });
    const data = await res.json();

    if(!res.ok || !data.username){
      fail(data.error || 'Unbekannter Fehler');
      return;
    }

    localStorage.setItem('kick_session', JSON.stringify({ username: data.username, avatar: data.avatar }));
    sessionStorage.removeItem('kick_code_verifier');
    sessionStorage.removeItem('kick_oauth_state');
    sessionStorage.removeItem('kick_redirect_page');
    statusEl.textContent = 'Erfolgreich angemeldet! Weiterleitung …';
    location.href = returnPage;
  }catch(e){
    fail(e.message);
  }
})();
</script>
</body>
</html>
